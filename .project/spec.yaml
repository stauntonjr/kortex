specVersion: v2
specMinorVersion: 2
meta:
    name: stauntonjr-kortex
    image: project-stauntonjr-kortex
    description: Autonomous model gateway and hybrid memory platform for DGX Spark.
    labels:
        - LLM
        - RAG
        - TypeDB
        - LangGraph
        - DGX-Spark
        - cuda13.1
        - pytorch2.11
    createdOn: "2026-07-22T21:26:22Z"
    defaultBranch: master
layout: []
environment:
    base:
        registry: nvcr.io
        image: nvidia/ai-workbench/pytorch:1.0.10
        build_timestamp: "20260514182545"
        name: PyTorch
        supported_architectures: []
        cuda_version: "13.1"
        description: A Pytorch 2.11 Base with CUDA 13.1
        entrypoint_script: ""
        labels:
            - cuda13.1
            - pytorch2.11
        apps:
            - name: jupyterlab
              type: jupyterlab
              class: webapp
              start_command: jupyter lab --allow-root --port 8888 --ip 0.0.0.0 --no-browser --NotebookApp.base_url=\$PROXY_PREFIX --NotebookApp.default_url=/lab --NotebookApp.allow_origin='*'
              health_check_command: '[ \$(echo url=\$(jupyter lab list | head -n 2 | tail -n 1 | cut -f1 -d'' '' | grep -v ''Currently'' | sed "s@/?@/lab?@g") | curl -o /dev/null -s -w ''%{http_code}'' --config -) == ''200'' ]'
              stop_command: jupyter lab stop 8888
              user_msg: ""
              logfile_path: ""
              timeout_seconds: 60
              icon_url: ""
              webapp_options:
                autolaunch: true
                port: "8888"
                proxy:
                    trim_prefix: false
                url_command: jupyter lab list | head -n 2 | tail -n 1 | cut -f1 -d' ' | grep -v 'Currently'
        programming_languages:
            - python3
        icon_url: https://workbench.download.nvidia.com/static/img/ai-workbench-icon-rectangle.jpg
        image_version: 1.0.10
        os: linux
        os_distro: ubuntu
        os_distro_release: "24.04"
        schema_version: v2
        user_info:
            uid: ""
            gid: ""
            username: ""
        package_managers:
            - name: apt
              binary_path: /usr/bin/apt
              installed_packages:
                - curl
                - git
                - git-lfs
                - vim
            - name: pip
              binary_path: /usr/local/bin/pip
              installed_packages:
                - jupyterlab>=4.5.7
        package_manager_environment:
            name: ""
            target: ""
    compose_file_path: ""
execution:
    apps:
        - name: VS Code
          type: vs-code
          class: native
          start_command: ""
          health_check_command: '[ \$(ps aux | grep ".vscode-server" | grep -v grep | wc -l ) -gt 4 ] && [ \$(ps aux | grep "/.vscode-server/bin/.*/node .* net.createConnection" | grep -v grep | wc -l) -gt 0 ]'
          stop_command: ""
          user_msg: ""
          logfile_path: ""
          timeout_seconds: 120
          icon_url: ""
    resources:
        gpu:
            requested: 1
        sharedMemoryMB: 16384
    secrets: []
    mounts:
        - type: project
          target: /project/
          description: Project directory
          options: rw
        - type: volume
          target: /nvwb-shared-volume/
          description: ""
          options: volumeName=nvwb-shared-volume
