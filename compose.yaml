name: kortex

services:
  typedb:
    image: typedb/typedb:3.12.1
    container_name: kortex-typedb
    restart: unless-stopped
    ports:
      - "1729:1729"
    volumes:
      - typedb-data:/opt/typedb-all-linux-x86_64/server/data
      - ./typedb-config.yml:/opt/typedb-server-linux-arm64/server/config.yml:ro
    # healthcheck removed because the TypeDB image does not include `curl`.
    # Container logs show the server is running; skip image-level health probing.

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: kortex-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    # The stock qdrant image does not include curl or wget, so leave the
    # container unprobed here instead of forcing a permanently unhealthy state.

  redis:
    image: redis:7.4-alpine
    container_name: kortex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  
  gateway:
    image: python:3.11-slim
    container_name: kortex-gateway
    restart: unless-stopped
    depends_on:
      - typedb
      - qdrant
      - redis
    ports:
      - "8080:8080"
    working_dir: /opt/kortex
    volumes:
      - ./:/opt/kortex:ro
    environment:
      - TYPEDB_ADDR=typedb:1729
      - QDRANT_ADDR=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - GATEWAY_URL=http://localhost:8080/v1
    command: ["sh", "-c", "pip install --no-cache-dir -r /opt/kortex/requirements.txt && python -m gateway.gateway"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health').status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  typedb-data:
  qdrant-data:
  redis-data:
